<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="designing of product review form for end users">
    <meta name="author" content="Doris Nnenna Amuji">
    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header><h1>Product Review</h1></header>

    <main><form method="get" action="review.html">

    <div>
        <label for="product">Product Name</label>
    
        <select id="product" name="product" required>
    
            <option value="" disabled selected>
                Select a Product ...
            </option>
    
        </select>
    </div>

    <div>
        <label>Overall Rating</label>
    
        <div class="rating">
    
            <input type="radio" id="rating1" name="rating" value="1" required>
            <label for="rating1">☆</label>
    
            <input type="radio" id="rating2" name="rating" value="2">
            <label for="rating2">☆☆</label>
    
            <input type="radio" id="rating3" name="rating" value="3">
            <label for="rating3">☆☆☆</label>
    
            <input type="radio" id="rating4" name="rating" value="4">
            <label for="rating4">☆☆☆☆</label>
    
            <input type="radio" id="rating5" name="rating" value="5">
            <label for="rating5">☆☆☆☆☆</label>
    
        </div>
    </div>

    <div>
        <label for="installDate">Date of Installation</label>
    
        <input type="date" id="installDate" name="installDate" required>
    </div>


    <fieldset>
        <legend>
            Which features did you find useful?
            <span class="instruction">(Check all that apply)</span>
        </legend>
    
        <div class="feature-item">
            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>
        </div>
    
        <div class="feature-item">
            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>
        </div>
    
        <div class="feature-item">
            <input type="checkbox" id="ease" name="features" value="Ease of Use">
            <label for="ease">Ease of Use</label>
        </div>
    
        <div class="feature-item">
            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>
        </div>
    </fieldset>

    <div>
        <label for="review">Written Review (Optional)</label>
    
        <textarea id="review" name="review" rows="5" placeholder="Share your experience with this product...">
        </textarea>
    </div>

    <div>
        <label for="review">Written Review (Optional)</label>
    
        <textarea id="review" name="review" rows="5" placeholder="Share your experience with this product...">
        </textarea>
    </div>

    <div>
    <label for="username">User Name (Optional)</label>

    <input
        type="text"
        id="username"
        name="username">
</div>

<div>
    <input type="submit" value="Submit Review">
</div>

    </form>
</main>




    <footer>
        <p>
            ©️ <span id="currentyear"></span> Doris Nnenna Amuji | Lagos, Nigeria.
        </p>
        <p id="lastModified"></p>
    </footer>
    
</body>
</html>
