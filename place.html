<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Place Page</title>
    <meta name="description" 
        content="Abuja is such a wonderful,beautiful, and calm city in Nigeria.">
    <meta name="author" content="Doris Nnenna Amuji">
    <link rel="stylesheet" href="wk3styles/place.css">
    <script src="wk3scripts/place.js" defer></script>
</head>

<body>
    <header>
        <h1>Abuja</h1>
    </header>

    <main>
        <section class="hero">
            <picture>
                <source srcset="images/hero-large2.webp" media="(min-width: 768px)">
                <img src="images/hero-small2.webp" alt="Captivating view of Abuja">
            </picture>

            <section class="data-card">
                <h2>Data</h2>
                <p><strong>Area:</strong> 1769 km²</p>
                <p><strong>Population:</strong> 3.6 million</p>
                <p><strong>Capital:</strong> Federal Capital Territory</p>
                <p><strong>Language:</strong> English</p>
                <p><strong>Currency:</strong> Naira</p>
                <p><strong>Calling Code:</strong> +234</p>

        
        </section>

        <section class="weather-card">
            <h3 class="weather-heading">Weather</h3>
            <img src="images/weathericon.svg" alt="Weather Icon" class="mobile-icon">
            <p>Temperature: <span id="temp">20</span>°C</p>
            <p>Wind: <span id="wind">10</span> km/h</p>
            <p>Conditions: Partly Cloudy</p>
            <p>Wind Chill: <span id="windchill"></span></p>
        </section>
        </section>
    </main>

    <footer>
        <p>©️<span id="currentyear"></span>
        💐Doris Nnenna Amuji💐 Abuja </p>

        <p id="lastModified"></p>
    </footer>

</body>

</html>
